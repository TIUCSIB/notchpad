<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Notchpad — 一款刘海风格的桌面浮动便签应用，Electron + Vue 3 + TipTap">
  <title>Notchpad - 刘海风格浮动便签</title>
  <link rel="icon" type="image/svg+xml" href="../build/icon.png">
  <style>
    :root {
      color-scheme: dark;
      --page: #08090b;
      --ink: #f5f5f6;
      --muted: rgba(245, 245, 246, 0.64);
      --quiet: rgba(245, 245, 246, 0.42);
      --blue: #9bb8ff;
      --green: #4ade80;
      --green-glow: rgba(74, 222, 128, 0.3);
      --pink: #ffa7cc;
      --purple: #c4a8ff;
      --amber: #ffd599;
      --shadow: 0 42px 130px rgba(0, 0, 0, 0.62);
      --radius: 18px;
      /* Notchpad app colors */
      --np-bg: #000000;
      --np-card: #0f1014;
      --np-toolbar: #151516;
      --np-bar: #1a1a1a;
      --np-text: #e5e5e5;
      --np-muted: #888888;
      --np-border: #2a2a2c;
      --np-hover: #3a3a3a;
      font-family: "SF Pro Text", "SF Pro Display", "Helvetica Neue", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--ink);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    /* ═══ Page ═══ */
    .page {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% -18%, rgba(74, 222, 128, 0.12), transparent 34%),
        radial-gradient(circle at 72% 26%, rgba(155, 184, 255, 0.06), transparent 24%),
        radial-gradient(circle at 22% 70%, rgba(255, 167, 204, 0.05), transparent 26%),
        linear-gradient(180deg, #0d0e13 0%, #08090b 54%, #06070a 100%);
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(115deg, transparent 0 48%, rgba(255, 255, 255, 0.028) 49% 51%, transparent 52%),
        radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0 0.55px, transparent 0.65px);
      background-size: 92px 92px, 4px 4px;
      opacity: 0.46;
      mask-image: linear-gradient(to bottom, transparent 0%, black 16%, black 78%, transparent 100%);
    }

    /* ═══ Nav ═══ */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 58px;
      width: min(1120px, calc(100vw - 36px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      /* background: rgba(8, 9, 11, 0.6); */
      /* border-bottom: 1px solid rgba(255, 255, 255, 0.04); */
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 700;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--green), #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-link {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border-radius: 8px;
      transition: background 150ms ease, color 150ms ease;
    }

    .nav-link svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.96);
    }

    /* ═══ Hero ═══ */
    .hero {
      width: min(1040px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 10px 0 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: calc(100vh - 58px);
      justify-content: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.058);
      color: rgba(255, 255, 255, 0.68);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      font-size: 12px;
      font-weight: 680;
      letter-spacing: 0.02em;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 18px var(--green-glow);
    }

    h1 {
      max-width: 720px;
      margin: 20px auto 0;
      font-size: clamp(40px, 5.5vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 800;
      background: linear-gradient(180deg, #fff 20%, rgba(255, 255, 255, 0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subhead {
      max-width: 600px;
      margin: 16px auto 0;
      color: rgba(245, 245, 246, 0.56);
      font-size: clamp(14px, 1.5vw, 17px);
      line-height: 1.7;
      font-weight: 450;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      position: relative;
      overflow: hidden;
      transition: transform 160ms ease, background 160ms ease;
      border: none;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .btn.primary {
      color: #090a0d;
      background: linear-gradient(180deg, #fff, #e9e9ec);
      box-shadow: 0 12px 30px rgba(255, 255, 255, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .btn.primary::after {
      content: "";
      position: absolute;
      inset: 1px 1px auto auto;
      height: 48%;
      border-radius: 9px 9px 12px 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.74), transparent);
      pointer-events: none;
      opacity: 0.72;
    }

    .btn.secondary {
      color: rgba(255, 255, 255, 0.78);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.090), rgba(255, 255, 255, 0.055));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 10px 26px rgba(0, 0, 0, 0.16);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .install-note {
      margin: 12px 0 0;
      color: rgba(245, 245, 246, 0.36);
      font-size: 12px;
      font-weight: 500;
    }

    .install-note a {
      color: rgba(155, 184, 255, 0.8);
      transition: color 150ms ease;
    }

    .install-note a:hover {
      color: var(--blue);
    }

    /* ═══ Realistic Notchpad Demo ═══ */
    .demo-wrap {
      position: relative;
      width: min(720px, 100%);
      margin-top: clamp(28px, 4vh, 48px);
    }

    /* The notch pill (collapsed) */
    .np-notch {
      position: relative;
      width: 120px;
      height: 32px;
      margin: 0 auto;
      background: #1a1c24;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: none;
      border-radius: 0 0 18px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .np-notch::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 0 0 20px 20px;
      background: rgba(255, 255, 255, 0.35);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .np-notch:hover::before {
      opacity: 1;
      background: rgba(255, 255, 255, 0.12);
    }

    .np-notch:hover {
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.15));
    }

    .np-notch-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
      flex-shrink: 0;
    }

    .np-notch-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.02em;
    }

    /* The full panel */
    .np-panel {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      background: var(--np-bg);
      border-radius: 0 0 20px 20px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6), inset 0 -1px 0 rgba(255, 255, 255, 0.04);
      transition: max-height 0.5s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease;
      opacity: 0;
    }

    .np-panel.open {
      max-height: 420px;
      opacity: 1;
    }

    /* Top toolbar — matches TopToolbar.css exactly */
    .np-topbar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 40px;
      padding: 4px 16px;
      flex-shrink: 0;
    }

    .np-topbar-spacer {
      flex: 1;
    }

    .np-topbar-group {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--np-toolbar);
      border-radius: 8px;
      overflow: hidden;
      padding: 1px 6px;
    }

    .np-tool-btn {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      outline: none;
      border-radius: 6px;
      color: var(--np-muted);
      cursor: pointer;
      transition: background 150ms, color 150ms;
    }

    .np-tool-btn:hover {
      background: var(--np-hover);
      color: var(--np-text);
    }

    .np-tool-btn.danger:hover {
      background: rgba(220, 38, 38, 0.1);
      color: #dc2626;
    }

    .np-tool-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Page dots */
    .np-page-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 2px;
    }

    .np-page-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #aaa;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .np-page-dot.active {
      width: 20px;
      height: 8px;
      border-radius: 4px;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
    }

    /* Editor area */
    .np-editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 6px 16px 4px 16px;
      overflow: hidden;
    }

    .np-content-card {
      flex: 1;
      background: var(--np-card);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: visible;
    }

    .np-content-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 14px;
      border-radius: 12px 12px 0 0;
      min-height: 180px;
    }

    /* Rich text content inside the editor */
    .np-editor-content {
      font-size: 13px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.75);
    }

    .np-editor-content p {
      margin: 0 0 8px;
    }

    .np-editor-content strong {
      color: #fff;
      font-weight: 600;
    }

    .np-editor-content em {
      color: var(--blue);
    }

    .np-editor-content h2 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 10px;
      letter-spacing: -0.01em;
    }

    .np-editor-content h3 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      margin: 12px 0 6px;
    }

    .np-editor-content blockquote {
      border-left: 3px solid var(--green);
      padding-left: 12px;
      margin: 8px 0;
      color: rgba(255, 255, 255, 0.55);
      font-style: italic;
    }

    .np-editor-content ul,
    .np-editor-content ol {
      padding-left: 20px;
      margin: 4px 0 8px;
    }

    .np-editor-content li {
      margin-bottom: 3px;
    }

    .np-editor-content code {
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      color: var(--pink);
    }

    .np-editor-content .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }

    .np-check-box {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .np-check-box.done {
      background: var(--green);
      border-color: var(--green);
    }

    .np-check-box.done::after {
      content: "";
      width: 7px;
      height: 4px;
      border-left: 1.5px solid #000;
      border-bottom: 1.5px solid #000;
      transform: rotate(-45deg) translateY(-1px);
    }

    .np-check-done {
      text-decoration: line-through;
      color: rgba(255, 255, 255, 0.35);
    }

    /* Bottom bar — matches BottomBar.css exactly */
    .np-bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--np-bar);
      padding: 5px 8px 4px;
      flex-shrink: 0;
      border-radius: 0 0 8px 8px;
    }

    .np-format-group {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .np-fmt-btn {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: 5px;
      color: var(--np-muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: background 150ms, color 150ms;
    }

    .np-fmt-btn:hover {
      background: var(--np-hover);
      color: var(--np-text);
    }

    .np-fmt-btn.active {
      background: var(--np-hover);
      color: var(--green);
    }

    .np-fmt-btn svg {
      width: 14px;
      height: 14px;
    }

    .np-font-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: auto;
      margin-right: 4px;
    }

    .np-font-size {
      font-size: 10px;
      font-weight: 600;
      line-height: 1;
    }

    .np-font-family {
      font-size: 12px;
      font-weight: 700;
      font-family: Georgia, serif;
      line-height: 1;
    }

    .np-color-a {
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      border-bottom: 3px solid var(--purple);
      padding-bottom: 1px;
    }

    .np-highlight-b {
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      background: rgba(255, 213, 153, 0.4);
      padding: 0 2px;
      border-radius: 2px;
    }

    /* Save status */
    .np-save-status {
      height: 16px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-right: 4px;
      flex-shrink: 0;
    }

    .np-save-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--green);
      animation: fadeInUp 0.3s ease;
    }

    .np-save-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
    }

    /* Demo state transitions */
    .np-notch.collapsed {
      opacity: 1;
      max-height: 32px;
    }

    .np-notch.expanded {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      margin: 0 auto;
      pointer-events: none;
    }

    /* Glow behind the panel */
    .np-glow {
      position: absolute;
      left: 50%;
      top: -20px;
      width: 80%;
      height: 60px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(74, 222, 128, 0.1), transparent 68%);
      filter: blur(18px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .np-glow.show {
      opacity: 1;
    }

    /* Desktop background inside demo */
    .np-desktop {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(180deg, #131520 0%, #0e1018 100%);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .np-desktop::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 6px solid #050507;
      pointer-events: none;
      z-index: 20;
    }

    /* Simulated desktop background elements */
    .np-desktop-bg {
      position: absolute;
      inset: 0;
      padding: 50px 40px 30px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0.12;
      pointer-events: none;
    }

    .np-desktop-bg .line {
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.3);
    }

    /* Taskbar at bottom of desktop */
    .np-taskbar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: rgba(10, 10, 14, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 5;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .np-taskbar-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
    }

    .np-taskbar-dot.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
    }

    /* Demo controls */
    .demo-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .demo-btn {
      min-height: 32px;
      padding: 0 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 150ms ease;
    }

    .demo-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .demo-btn.active {
      background: rgba(74, 222, 128, 0.12);
      color: var(--green);
      border-color: rgba(74, 222, 128, 0.2);
    }

    /* ═══ Section titles ═══ */
    .section-title {
      text-align: center;
      font-size: clamp(26px, 3.2vw, 36px);
      font-weight: 760;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }

    .section-sub {
      text-align: center;
      color: rgba(245, 245, 246, 0.44);
      font-size: 14px;
      font-weight: 450;
      margin: 0 auto 40px;
      max-width: 480px;
      line-height: 1.6;
    }

    /* ═══ Features ═══ */
    .features {
      width: min(1040px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 80px 0 60px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .feature-card {
      padding: 28px 24px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.055);
      transition: background 250ms ease, border-color 250ms ease, transform 250ms ease;
    }

    .feature-card:hover {
      background: rgba(255, 255, 255, 0.055);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .feature-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .feature-icon svg {
      width: 18px;
      height: 18px;
    }

    .feature-icon.blue {
      background: rgba(155, 184, 255, 0.12);
      color: var(--blue);
    }

    .feature-icon.green {
      background: rgba(74, 222, 128, 0.12);
      color: var(--green);
    }

    .feature-icon.pink {
      background: rgba(255, 167, 204, 0.12);
      color: var(--pink);
    }

    .feature-icon.purple {
      background: rgba(196, 168, 255, 0.12);
      color: var(--purple);
    }

    .feature-icon.amber {
      background: rgba(255, 213, 153, 0.12);
      color: var(--amber);
    }

    .feature-card h3 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
    }

    .feature-card p {
      margin: 0;
      color: rgba(245, 245, 246, 0.5);
      font-size: 13px;
      line-height: 1.65;
      font-weight: 450;
    }

    /* ═══ Tech Stack ═══ */
    .tech-section {
      width: min(1040px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 20px 0 60px;
    }

    .tech-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .tech-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.045);
      transition: background 200ms ease;
    }

    .tech-item:hover {
      background: rgba(255, 255, 255, 0.055);
    }

    .tech-logo {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .tech-name {
      font-size: 13px;
      font-weight: 680;
    }

    .tech-desc {
      font-size: 11px;
      color: rgba(245, 245, 246, 0.4);
      font-weight: 450;
      margin-top: 2px;
    }

    /* ═══ Shortcuts ═══ */
    .shortcuts-section {
      width: min(1040px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 20px 0 80px;
    }

    .shortcuts-table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .shortcuts-table th,
    .shortcuts-table td {
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 13px;
    }

    .shortcuts-table th {
      background: rgba(255, 255, 255, 0.03);
      color: rgba(245, 245, 246, 0.5);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .shortcuts-table tr:last-child td {
      border-bottom: none;
    }

    .shortcuts-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 24px;
      padding: 0 7px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      font-weight: 600;
      color: rgba(245, 245, 246, 0.72);
      font-family: inherit;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
    }

    /* ═══ CTA ═══ */
    .cta-section {
      width: min(1040px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 0 0 100px;
    }

    .cta-box {
      text-align: center;
      padding: 56px 32px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(74, 222, 128, 0.08), transparent 60%),
        rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .cta-box h2 {
      margin: 0 0 12px;
      font-size: clamp(22px, 2.8vw, 30px);
      font-weight: 760;
    }

    .cta-box p {
      margin: 0 0 24px;
      color: rgba(245, 245, 246, 0.5);
      font-size: 14px;
      line-height: 1.65;
    }

    /* ═══ Footer ═══ */
    .footer {
      width: min(1120px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(245, 245, 246, 0.28);
      font-size: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      color: rgba(245, 245, 246, 0.35);
      transition: color 150ms ease;
    }

    .footer-links a:hover {
      color: rgba(245, 245, 246, 0.7);
    }

    /* ═══ Scroll reveal ═══ */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ═══ Animations ═══ */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 768px) {
      .features {
        grid-template-columns: 1fr;
      }

      .tech-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .footer {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }

      .nav {

      .nav-links {
        gap: 2px;
      }

      .nav-link {
        padding: 0 8px;
        font-size: 12px;
      }

      .np-desktop {
        aspect-ratio: 4/3;
      }
    }

    @media (max-width: 480px) {
      .tech-grid {
        grid-template-columns: 1fr;
      }

      .shortcuts-table th,
      .shortcuts-table td {
        padding: 10px 12px;
      }
    }

    .logo {
      width: 30px;
      height: 30px;
    }
  </style>
</head>

  <script>
    // ═══ Tab content — matches real Notchpad editor content ═══
    const tabContents = [
      // Tab 0: 笔记内容 (rich text with headings, bold, blockquote)
      `<h2>今日灵感记录</h2>
       <p>今天在咖啡馆偶遇了一本好书，关于设计心理学的。</p>
       <p>其中提到的 <strong>"可供性"</strong> 概念很有启发 — 好的界面不需要说明书。</p>
       <blockquote>联想到 Notchpad 的刘海交互，用户看到小药丸就知道可以点击展开，这就是直观设计的力量。</blockquote>
       <p>下午整理了几个新功能的 UI 方案，准备用 <strong>TipTap</strong> 实现富文本编辑区域。</p>`,
      // Tab 1: 任务清单 (checklist items)
      `<div class="check-item"><span class="np-check-box done"></span><span class="np-check-done">完成刘海弹出动画</span></div>
       <div class="check-item"><span class="np-check-box done"></span><span class="np-check-done">TipTap 编辑器集成</span></div>
       <div class="check-item"><span class="np-check-box done"></span><span class="np-check-done">多页面拖拽排序</span></div>
       <div class="check-item"><span class="np-check-box"></span><span>深色/浅色主题切换</span></div>
       <div class="check-item"><span class="np-check-box"></span><span>数据导入/导出功能</span></div>
       <div class="check-item"><span class="np-check-box"></span><span>发布 v1.0 正式版</span></div>`,
      // Tab 2: 项目计划 (code + structured content)
      `<h3>Phase 1 — 核心编辑体验</h3>
       <ul>
         <li><code>✅</code> 刘海 UI + 弹性动画</li>
         <li><code>✅</code> 富文本编辑器</li>
         <li><code>✅</code> 本地数据持久化</li>
       </ul>
       <h3>Phase 2 — 效率提升</h3>
       <ul>
         <li><code>⬜</code> 全局快捷键</li>
         <li><code>⬜</code> Markdown 导出</li>
         <li><code>⬜</code> 插件系统</li>
       </ul>`
    ];

    const npNotch = document.getElementById('npNotch');
    const npPanel = document.getElementById('npPanel');
    const npGlow = document.getElementById('npGlow');
    const npEditorBody = document.getElementById('npEditorBody');
    const pageDots = document.querySelectorAll('.np-page-dot');
    const btnAuto = document.getElementById('btnAuto');
    const btnExpand = document.getElementById('btnExpand');
    const btnCollapse = document.getElementById('btnCollapse');

    let autoMode = true;
    let autoTimer = null;
    let currentTab = 0;
    let isExpanded = false;

    function setTabContent(idx) {
      currentTab = idx;
      pageDots.forEach((d, i) => d.classList.toggle('active', i === idx));
      npEditorBody.innerHTML = tabContents[idx];
    }

    function expand() {
      isExpanded = true;
      npNotch.classList.add('expanded');
      npPanel.classList.add('open');
      npGlow.classList.add('show');
      setTabContent(currentTab);
    }

    function collapse() {
      isExpanded = false;
      npNotch.classList.remove('expanded');
      npPanel.classList.remove('open');
      npGlow.classList.remove('show');
    }

    function cycleTabs() {
      currentTab = (currentTab + 1) % 3;
      setTabContent(currentTab);
    }

    function startAutoDemo() {
      stopAutoDemo();
      autoTimer = setInterval(() => {
        if (!isExpanded) {
          expand();
        } else {
          cycleTabs();
          if (currentTab === 0) {
            setTimeout(collapse, 1200);
          }
        }
      }, 2200);
    }

    function stopAutoDemo() {
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    }

    // Initial state
    setTabContent(0);
    startAutoDemo();

    // Control buttons
    btnAuto.addEventListener('click', () => {
      autoMode = true;
      btnAuto.classList.add('active');
      btnExpand.classList.remove('active');
      btnCollapse.classList.remove('active');
      startAutoDemo();
    });
    btnExpand.addEventListener('click', () => {
      autoMode = false;
      stopAutoDemo();
      btnAuto.classList.remove('active');
      btnExpand.classList.add('active');
      btnCollapse.classList.remove('active');
      expand();
    });
    btnCollapse.addEventListener('click', () => {
      autoMode = false;
      stopAutoDemo();
      btnAuto.classList.remove('active');
      btnExpand.classList.remove('active');
      btnCollapse.classList.add('active');
      collapse();
    });

    // Click notch to toggle in manual mode
    npNotch.addEventListener('click', () => {
      if (!autoMode) {
        isExpanded ? collapse() : expand();
      }
    });

    // Click page dots to switch tabs
    pageDots.forEach((dot, i) => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isExpanded) setTabContent(i);
      });
    });

    // ═══ Scroll reveal ═══
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 60);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    reveals.forEach(el => observer.observe(el));

    // ═══ Smooth scroll ═══
    document.querySelectorAll('.nav-link[href^="#"]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.querySelector(link.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  </script>
</body>

</html>
