<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="640" cy="280" r="300" fill="url(#accentGlow)" opacity="0.15"/>

  <!-- Left side: Title -->
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Notchpad</text>
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" letter-spacing="0.5">Smart Notch-powered Floating Notes</text>

  <!-- Feature pills -->
  <g transform="translate(80, 330)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
    <text x="65" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="500">Rich Editor</text>

    <rect x="144" y="0" width="140" height="32" rx="16" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
    <text x="214" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="500">Auto Save</text>

    <rect x="298" y="0" width="120" height="32" rx="16" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
    <text x="358" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="500">Multi-Page</text>

    <rect x="432" y="0" width="150" height="32" rx="16" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
    <text x="507" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="500">Dark / Light Theme</text>
  </g>

  <!-- Right side: App mockup -->
  <g transform="translate(720, 100)">
    <!-- Window shadow -->
    <rect x="4" y="8" width="460" height="340" rx="14" fill="#000" opacity="0.5" filter="url(#softGlow)"/>

    <!-- Window frame -->
    <rect x="0" y="4" width="460" height="340" rx="14" fill="#0f1014" stroke="#2a2a2c" stroke-width="1"/>

    <!-- Top toolbar -->
    <rect x="0" y="4" width="460" height="44" rx="14" fill="#151516"/>
    <rect x="0" y="32" width="460" height="16" fill="#151516"/>

    <!-- Toolbar capsule group -->
    <rect x="20" y="14" width="180" height="28" rx="8" fill="#1a1a1a"/>
    <circle cx="38" cy="28" r="4" fill="#555"/>
    <!-- Active dot -->
    <rect x="52" y="24" width="20" height="8" rx="4" fill="url(#accent)"/>
    <circle cx="86" cy="28" r="4" fill="#555"/>
    <circle cx="100" cy="28" r="4" fill="#555"/>
    <circle cx="114" cy="28" r="4" fill="#555"/>
    <circle cx="128" cy="28" r="4" fill="#555"/>
    <!-- Plus button -->
    <line x1="170" y1="28" x2="182" y2="28" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <line x1="176" y1="22" x2="176" y2="34" stroke="#555" stroke-width="2" stroke-linecap="round"/>

    <!-- Trash icon -->
    <line x1="416" y1="20" x2="428" y2="20" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <!-- Settings icon -->
    <circle cx="444" cy="28" r="6" stroke="#555" stroke-width="1.5" fill="none"/>

    <!-- Content area -->
    <rect x="20" y="56" width="420" height="230" rx="8" fill="#0f1014"/>

    <!-- Editor content lines -->
    <rect x="36" y="72" width="180" height="10" rx="3" fill="#e5e5e5" opacity="0.7"/>
    <rect x="36" y="96" width="350" height="7" rx="2" fill="#e5e5e5" opacity="0.35"/>
    <rect x="36" y="112" width="320" height="7" rx="2" fill="#e5e5e5" opacity="0.25"/>
    <rect x="36" y="128" width="280" height="7" rx="2" fill="#e5e5e5" opacity="0.25"/>

    <rect x="36" y="152" width="120" height="10" rx="3" fill="#e5e5e5" opacity="0.5"/>
    <rect x="36" y="176" width="380" height="7" rx="2" fill="#e5e5e5" opacity="0.3"/>
    <rect x="36" y="192" width="300" height="7" rx="2" fill="#e5e5e5" opacity="0.2"/>
    <rect x="36" y="208" width="340" height="7" rx="2" fill="#e5e5e5" opacity="0.2"/>

    <!-- Code block hint -->
    <rect x="36" y="228" width="400" height="40" rx="6" fill="#1a1a1a"/>
    <rect x="48" y="238" width="100" height="6" rx="2" fill="#4ade80" opacity="0.5"/>
    <rect x="48" y="250" width="160" height="6" rx="2" fill="#e5e5e5" opacity="0.2"/>

    <!-- Bottom bar -->
    <rect x="0" y="292" width="460" height="52" rx="0" fill="#1a1a1a"/>
    <rect x="0" y="292" width="460" height="2" fill="#2a2a2c"/>

    <!-- Format buttons -->
    <rect x="20" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>
    <rect x="50" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>
    <rect x="80" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>
    <rect x="110" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>
    <rect x="140" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>
    <rect x="170" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>

    <!-- Font controls on right -->
    <rect x="370" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>
    <rect x="400" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>
    <rect x="430" y="306" width="24" height="24" rx="4" fill="#2a2a2a"/>

    <!-- Bottom rounded corners -->
    <rect x="0" y="334" width="460" height="10" rx="0" fill="#1a1a1a"/>
    <rect x="0" y="338" width="14" height="6" rx="3" fill="#0f1014"/>
    <rect x="446" y="338" width="14" height="6" rx="3" fill="#0f1014"/>
  </g>

  <!-- Notch pill floating above the mockup -->
  <g transform="translate(900, 82)">
    <rect x="-4" y="-4" width="88" height="20" rx="10" fill="#4ade80" opacity="0.15" filter="url(#softGlow)"/>
    <rect x="0" y="0" width="80" height="12" rx="6" fill="url(#accent)" filter="url(#glow)" opacity="0.9"/>
  </g>
</svg>
